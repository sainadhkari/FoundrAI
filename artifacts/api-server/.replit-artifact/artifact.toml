kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[[services]]
localPort = 8082
name = "FastAPI Server"
paths = ["/fastapi"]

[services.development]
run = "cd /home/runner/workspace/artifacts/fastapi-server && python -m uvicorn main:app --host 0.0.0.0 --port $PORT --reload"

[services.production]

[services.production.run]
args = ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8082", "--app-dir", "artifacts/fastapi-server"]

[services.production.run.env]
PORT = "8082"

[services.production.health.startup]
path = "/fastapi/healthz"
